# P0 + P1 链下服务本地/预发部署
# 用法:
#   .\scripts\bootstrap-services-env.ps1
#   docker compose -f docker-compose.services.yml up -d --build
#   .\scripts\verify-services-health.ps1 -IncludeP1

services:
  gas-station:
    build:
      context: .
      dockerfile: services/gas-station/Dockerfile
    ports:
      - "8787:8787"
    env_file:
      - ./services/gas-station/.env.local
    environment:
      PORT: "8787"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8787/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  lp-guard-keeper:
    build:
      context: .
      dockerfile: services/lp-guard-keeper/Dockerfile
    ports:
      - "8788:8788"
    env_file:
      - ./services/lp-guard-keeper/.env.local
    environment:
      LP_GUARD_HEALTH_PORT: "8788"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  chain-monitor:
    build:
      context: .
      dockerfile: services/chain-monitor/Dockerfile
    ports:
      - "8789:8789"
    env_file:
      - ./services/chain-monitor/.env.local
    depends_on:
      gas-station:
        condition: service_healthy
      lp-guard-keeper:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8789/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

  oracle-relayer:
    build:
      context: .
      dockerfile: services/oracle-relayer/Dockerfile
    ports:
      - "8790:8790"
    env_file:
      - ./services/oracle-relayer/.env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8790/health"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 20s

  walrus-relay:
    build:
      context: .
      dockerfile: services/walrus-relay/Dockerfile
    ports:
      - "8791:8791"
    env_file:
      - ./services/walrus-relay/.env.local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8791/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
