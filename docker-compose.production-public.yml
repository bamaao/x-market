# 将链下服务端口绑定到公网（供 Vercel 反向代理访问，无域名场景）
# 用法:
#   docker compose -f docker-compose.production.yml \
#     -f docker-compose.production-public.yml --profile p2 up -d --build

services:
  gas-station:
    ports:
      - "8787:8787"

  lp-guard-keeper:
    ports:
      - "8788:8788"

  chain-monitor:
    ports:
      - "8789:8789"

  oracle-relayer:
    ports:
      - "8790:8790"

  walrus-relay:
    ports:
      - "8791:8791"

  indexer:
    ports:
      - "8800:8800"

  pricing-engine:
    ports:
      - "8801:8801"

  postgres:
    ports:
      - "127.0.0.1:5432:5432"
